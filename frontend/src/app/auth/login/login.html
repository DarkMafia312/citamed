<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 8V16M8 12H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>CitaMed</h2>
      <p>Sistema de Gestión Médica</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 21V19C20 16.7909 18.2091 15 16 15H8C5.79086 15 4 16.7909 4 19V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <input
            type="text"
            class="form-control"
            formControlName="username"
            [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            placeholder="Ingrese su usuario"
            autocomplete="username">
        </div>
        <div class="invalid-feedback" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.errors?.['required']">
          El usuario es obligatorio
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 11V7a4 4 0 1 1 8 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            placeholder="Ingrese su contraseña"
            autocomplete="current-password">
          <button type="button" class="toggle-password" (click)="mostrarPassword = !mostrarPassword" tabindex="-1">
            <svg *ngIf="!mostrarPassword" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 12C2 12 5 5 12 5C19 5 22 12 22 12C22 12 19 19 12 19C5 19 2 12 2 12Z" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <svg *ngIf="mostrarPassword" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3L21 21M10.5 10.7C10.18 11.02 10 11.49 10 12C10 13.1 10.9 14 12 14C12.5 14 12.97 13.82 13.3 13.5M6.5 6.7C4.5 8.1 3 10 2 12C2 12 5 19 12 19C13.8 19 15.3 18.5 16.6 17.8M9.9 5.2C10.6 5.06 11.3 5 12 5C19 5 22 12 22 12C22 12 21.4 13.3 20.3 14.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          La contraseña es obligatoria
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || cargando">
        <span *ngIf="!cargando">Ingresar</span>
        <span *ngIf="cargando" class="spinner"></span>
      </button>
    </form>

    <div class="login-footer">
      <p>&copy; 2026 CitaMed - Todos los derechos reservados</p>
    </div>
  </div>
</div>

<app-confirm-dialog></app-confirm-dialog>
